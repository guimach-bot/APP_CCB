<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>App Documentos</title>

  <!-- SUPABASE CORRETO -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- PDF -->
  <script src="https://unpkg.com/pdf-lib"></script>

  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    button { padding: 10px; margin: 5px; font-size: 16px; }
    video { width: 90%; max-width: 400px; }
  </style>
</head>

<body>

<h2>📄 Sistema de Documentos</h2>

<!-- TELA INICIAL -->
<div id="inicio">
  <select id="mes">
    <option>Janeiro</option>
    <option>Fevereiro</option>
    <option>Março</option>
  </select><br><br>

  <input type="text" id="local" placeholder="Local"><br><br>

  <button onclick="iniciar()">Iniciar</button>
</div>

<!-- SETORES -->
<div id="setores" style="display:none;">
  <h3>Selecione o Setor</h3>

  <button onclick="abrirSetor('Voluntaria')">Atividade Voluntária</button>
  <button onclick="abrirSetor('Tesouraria')">Tesouraria</button>
  <button onclick="abrirSetor('Manutencao')">Manutenção</button>
</div>

<!-- CAMERA -->
<div id="camera" style="display:none;">
  <h3 id="instrucao"></h3>

  <video id="video" autoplay playsinline></video><br>

  <button onclick="tirarFoto()">📸 Tirar Foto</button>
  <button onclick="abrirLens()">📄 Usar Scanner</button>
  <button onclick="concluir()">✅ Concluir</button>
  <button onclick="voltar()">🔙 Voltar</button>
</div>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://gbfazxfxwffutwbstays.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiZmF6eGZ4d2ZmdXR3YnN0YXlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDEwMTEsImV4cCI6MjA4OTUxNzAxMX0.GQuJmN0hPBekwSJQjonfNWWf2NyFrmIvlQpA1hG1W04"
);

let registroId;
let setorAtual;
let fotos = [];
let mesGlobal;
let localGlobal;

// =========================
// INICIAR
// =========================
async function iniciar() {
  try {
    mesGlobal = document.getElementById("mes").value;
    localGlobal = document.getElementById("local").value;

    if (!localGlobal) {
      alert("Informe o local!");
      return;
    }

    const { data, error } = await supabaseClient
      .from("registros")
      .insert([{ mes: mesGlobal, local: localGlobal }])
      .select();

    if (error) {
      console.error(error);
      alert("Erro ao salvar no banco!");
      return;
    }

    registroId = data[0].id;

    document.getElementById("inicio").style.display = "none";
    document.getElementById("setores").style.display = "block";

  } catch (err) {
    console.error(err);
    alert("Erro inesperado!");
  }
}

// =========================
// ABRIR SETOR
// =========================
function abrirSetor(setor) {
  setorAtual = setor;
  fotos = [];

  document.getElementById("setores").style.display = "none";
  document.getElementById("camera").style.display = "block";

  iniciarCamera();

  if (setor === "Tesouraria") {
    document.getElementById("instrucao").innerText =
      "1. Tire a foto da folha de coleta (OBRIGATÓRIO)";
  } else if (setor === "Voluntaria") {
    document.getElementById("instrucao").innerText =
      "Tire fotos da folha amarela";
  } else {
    document.getElementById("instrucao").innerText =
      "Tire fotos de manutenção";
  }
}

// =========================
// CAMERA
// =========================
async function iniciarCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    document.getElementById("video").srcObject = stream;
  } catch (err) {
    alert("Erro ao acessar câmera!");
    console.error(err);
  }
}

// =========================
// ABRIR LENS
// =========================
function abrirLens() {
  window.location.href = "ms-lens://";
}

// =========================
// TIRAR FOTO
// =========================
function tirarFoto() {
  const video = document.getElementById("video");

  if (!video.srcObject) {
    alert("Câmera não iniciada!");
    return;
  }

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video, 0, 0);

  canvas.toBlob(async (blob) => {
    try {
      let nome = `${localGlobal}_${setorAtual}_${Date.now()}.png`;

      const { error: uploadError } = await supabaseClient
        .storage.from("documentos")
        .upload(nome, blob);

      if (uploadError) {
        console.error(uploadError);
        alert("Erro ao subir imagem!");
        return;
      }

      let url = supabaseClient
        .storage.from("documentos")
        .getPublicUrl(nome).data.publicUrl;

      fotos.push(url);

      await supabaseClient.from("uploads").insert([{
        registro_id: registroId,
        setor: setorAtual,
        arquivo_url: url
      }]);

      alert("Foto enviada!");

    } catch (err) {
      console.error(err);
      alert("Erro ao processar foto!");
    }
  });
}

// =========================
// CONCLUIR
// =========================
async function concluir() {
  if (fotos.length === 0) {
    alert("Envie ao menos uma foto!");
    return;
  }

  await gerarPDF();

  alert("Processo concluído!");
  voltar();
}

// =========================
// GERAR PDF
// =========================
async function gerarPDF() {
  const pdfDoc = await PDFLib.PDFDocument.create();

  for (let url of fotos) {
    const bytes = await fetch(url).then(res => res.arrayBuffer());

    let image;

    try {
      image = await pdfDoc.embedJpg(bytes);
    } catch {
      image = await pdfDoc.embedPng(bytes);
    }

    const page = pdfDoc.addPage([600, 800]);

    page.drawImage(image, {
      x: 0,
      y: 0,
      width: 600,
      height: 800
    });
  }

  const pdfBytes = await pdfDoc.save();

  const nomePDF = `${localGlobal}_${setorAtual}_${mesGlobal}_2026.pdf`;

  await supabaseClient.storage.from("documentos")
    .upload(nomePDF, pdfBytes, {
      contentType: "application/pdf"
    });
}

// =========================
// VOLTAR
// =========================
function voltar() {
  document.getElementById("camera").style.display = "none";
  document.getElementById("setores").style.display = "block";
}
</script>

</body>
</html>
